<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../css/hazard-library.css">
    <link rel="stylesheet" href="../css/nav.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/checklist.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist</title>
</head>
<body>
    <div id="navbar"></div>
    
    
    <div class="screen-container">
        <div>
            <button class="clear-button" id="clearCheckboxesButton">Clear Checkboxes</button>
        </div>

        <div class="category-container">
            <h3>Vulnerable Details and Material Hazards <strong class="count" id="vulnerableCount">(0)</strong></h3>
            <h3>Condition Hazards - External <strong class="count" id="conditionExtCount">(0)</strong></h3>
            <h3>Condition Hazards - Internal (Post-Tensioning) <strong class="count" id="conditionIntCount">(0)</strong></h3>
            <h3>History Hazards <strong class="count" id="historyCount">(0)</strong></h3>
            <h3>Assessment Hazards <strong class="count" id="assessmentCount">(0)</strong></h3>
            
            <div class="checklist-container" id="vulnerableDetails"></div>
            <div class="checklist-container" id="conditionExt"></div>
            <div class="checklist-container" id="conditionInt"></div>
            <div class="checklist-container" id="history"></div>
            <div class="checklist-container" id="assessment"></div>
        </div>
    </div>




    <script src="../js/navbar.js" defer></script>
    <script type="module" src="../js/checklist.js"></script>
</body>
</html>
